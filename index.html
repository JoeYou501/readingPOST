<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Notes Auto-Carousel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    /* ✨ 專屬大地色系質感品牌色 */
                    colors: { 
                        primary: '#3d5a4b',    // 墨綠 
                        secondary: '#c59d5f',  // 暖駝金
                        bglight: '#fdfbf7'     // 暖米白
                    },
                    fontFamily: { 
                        serif: ['"Noto Serif TC"', 'serif'], 
                        sans: ['"Noto Sans TC"', 'sans-serif'] 
                    }
                }
            }
        }
        const ACCESS_PASSWORD = "7788999"; 
    </script>
    <style>
        body { background-color: #e2e8f0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; font-family: 'Noto Sans TC', sans-serif; }
        
        #poster-wrapper { width: 720px; transform-origin: top center; flex-shrink: 0; }
        
        /* 💡 核心修正：強制鎖死 height: 900px，防止容器坍塌 */
        #poster-card { width: 720px; height: 900px; background-color: #fdfbf7; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 🎨 高級雜誌風：網點紋理與柔和環境光晕 */
        .bg-texture-dots { position: absolute; inset: 0; z-index: 1; background-image: radial-gradient(rgba(61, 90, 75, 0.05) 1.5px, transparent 1.5px); background-size: 24px 24px; }
        .bg-accent-line { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #c59d5f; z-index: 10; }
        .bg-orb-top { position: absolute; top: -250px; right: -200px; width: 700px; height: 700px; background: radial-gradient(circle, rgba(197, 157, 95, 0.12) 0%, rgba(253, 251, 247, 0) 70%); border-radius: 50%; z-index: 0; }
        .bg-orb-bottom { position: absolute; bottom: -150px; left: -250px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(61, 90, 75, 0.08) 0%, rgba(253, 251, 247, 0) 70%); border-radius: 50%; z-index: 0; }

        @media (max-width: 768px) { 
            #poster-wrapper { transform: scale(0.5); margin-bottom: -450px; } 
            .editor-container { width: 95% !important; } 
        }
        
        #auth-overlay { position: fixed; inset: 0; background: #3d5a4b; z-index: 99999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="text-center p-8 bg-white/10 backdrop-blur-2xl rounded-[3rem] border border-white/20 shadow-2xl w-[90%] max-w-[420px]">
            <div class="mb-4 text-secondary flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-1 font-serif text-bglight tracking-widest uppercase italic">Reader's Vault</h2>
            <p class="text-bglight/50 text-[10px] mb-6 tracking-[0.4em] uppercase">Editorial Edition</p>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-bglight/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">API Key (自動存於本機)</label>
                    <input id="api-key-input" type="password" class="w-full p-4 rounded-xl bg-bglight/90 text-primary outline-none font-mono text-xs shadow-inner" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="text-bglight/70 text-[10px] uppercase tracking-widest mb-1 block text-left pl-2">System Password</label>
                    <input id="auth-input" type="password" onkeydown="if(event.key==='Enter') checkAuth()" class="w-full p-4 rounded-xl bg-bglight text-primary outline-none text-center font-bold tracking-[0.5em] text-xl shadow-inner" placeholder="•••••••">
                </div>
            </div>
            
            <button onclick="checkAuth()" class="w-full bg-secondary text-bglight py-4 rounded-2xl font-black text-xl shadow-xl hover:brightness-110 active:scale-95 transition-all">解鎖系統</button>
        </div>
    </div>

    <div class="editor-container mt-10 mb-10 w-full max-w-[720px] bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 relative z-20">
        <div class="bg-primary p-5 text-bglight flex justify-between items-center cursor-pointer" onclick="toggleEditor()">
            <h2 class="font-bold flex items-center gap-2 text-sm italic tracking-widest uppercase">📚 閱讀筆記全自動連載引擎</h2>
            <span class="text-[10px] px-3 py-1 bg-white/10 rounded-full border border-white/20 uppercase tracking-widest">Collapse</span>
        </div>
        
        <div id="editor-body" class="p-8 space-y-6">
            
            <div class="bg-bglight p-4 rounded-2xl border border-gray-100">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">🤖 AI 引擎即時切換 (動態抓取中)</label>
                <select id="curated-model-select" class="w-full p-3 rounded-xl border border-gray-200 bg-white text-primary outline-none text-xs font-bold shadow-sm cursor-pointer transition-all focus:border-secondary" onchange="saveModelPref()">
                    <option value="">解鎖後自動載入可用模型...</option>
                </select>
            </div>

            <div class="bg-primary/[0.03] p-6 rounded-[2rem] border border-primary/10">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-[10px] font-bold text-primary/60 uppercase tracking-[0.3em] block">貼上長文，AI 自動萃取</label>
                    <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-primary/10 shadow-sm">
                        <label class="text-[10px] font-bold text-primary/70 tracking-widest">產出頁數</label>
                        <input id="ai-target-pages" type="number" min="1" max="15" value="5" class="w-10 text-center font-black text-secondary outline-none bg-transparent">
                    </div>
                </div>
                <textarea id="ai-raw-input" rows="3" class="w-full p-4 border-2 border-dashed border-primary/20 rounded-2xl outline-none focus:border-secondary text-sm bg-white" placeholder="在此貼上讀書筆記、書摘或長篇好文..."></textarea>
                <button id="ai-btn" onclick="callRealAI()" class="w-full mt-3 bg-primary text-bglight py-4 rounded-xl font-bold text-xs hover:bg-primary/90 transition-all shadow-lg flex items-center justify-center gap-2">
                    <span id="ai-btn-text">🪄 啟動 3 段式圖卡萃取 (封面 ➔ 內容 ➔ 結論)</span>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-bglight p-4 rounded-2xl border border-gray-100 relative overflow-hidden">
                    <div id="ai-mode-badge" class="absolute top-0 right-0 bg-secondary text-bglight text-[9px] px-2 py-1 font-black tracking-widest hidden">AI 接管中</div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block">Slide / Total</label>
                        <label class="flex items-center gap-1 cursor-pointer relative z-10">
                            <input type="checkbox" id="show-page-toggle" checked onchange="sync()" class="accent-secondary w-3 h-3">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">顯示</span>
                        </label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input id="in-curr-page" type="number" oninput="sync()" class="w-12 border-b-2 border-primary/20 bg-transparent text-center font-black text-primary text-xl" value="1">
                        <span class="text-gray-300 font-bold">/</span>
                        <input id="in-total-page" type="number" oninput="sync()" class="w-12 border-b-2 border-gray-200 bg-transparent text-center font-black text-gray-400 text-xl" value="1">
                    </div>
                </div>
                <div class="bg-bglight p-4 rounded-2xl border border-gray-100">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Series Volume</label>
                        <label class="flex items-center gap-1 cursor-pointer">
                            <input type="checkbox" id="show-vol-toggle" checked onchange="sync()" class="accent-secondary w-3 h-3">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">顯示</span>
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-secondary font-black text-sm uppercase">VOL.</span>
                        <input id="in-no-num" type="number" oninput="sync()" class="w-full border-b-2 border-secondary/20 bg-transparent text-center font-black text-secondary text-xl" value="1">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <select id="in-type" onchange="sync()" class="p-4 border border-gray-100 rounded-2xl text-xs font-black text-primary bg-bglight focus:border-secondary outline-none cursor-pointer">
                        <option value="cover">🖼️ 封面模式 (無金句/無重點)</option>
                        <option value="content" selected>📝 內容模式 (有金句/有重點)</option>
                        <option value="conclusion">💡 結論模式 (大金句/無重點)</option>
                    </select>
                    <input id="in-tag" type="text" oninput="sync()" class="p-4 border border-gray-100 rounded-2xl text-xs font-black text-primary uppercase tracking-widest bg-bglight outline-none focus:border-secondary" placeholder="分類 (如: 心理學)">
                </div>
                
                <input id="in-ig" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs text-secondary font-black tracking-widest bg-bglight outline-none" value="@JoeYou501">
                <input id="in-title" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl focus:border-secondary font-serif font-black text-base outline-none" placeholder="主標題">
                <input id="in-subtitle" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl focus:border-secondary font-sans font-bold text-sm text-primary/70 outline-none" placeholder="一句副標題">
                <input id="in-p1" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs outline-none focus:border-secondary" placeholder="重點1|內文描述 (40字內)">
                <input id="in-p2" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs outline-none focus:border-secondary" placeholder="重點2|內文描述 (40字內)">
                <input id="in-p3" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs outline-none focus:border-secondary" placeholder="重點3|內文描述 (40字內)">
                <input id="in-quote" type="text" oninput="sync()" class="w-full p-4 border border-gray-100 rounded-2xl text-xs italic font-serif outline-none focus:border-secondary" placeholder="結尾金句">
            </div>

            <div class="flex gap-3">
                <button onclick="prevPage()" class="flex-[1] bg-white border border-gray-200 text-gray-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-gray-50 active:scale-95 transition-all shadow-sm">上一頁</button>
                <button onclick="downloadImage()" class="flex-[1.5] bg-primary text-bglight py-4 rounded-2xl font-black text-sm uppercase tracking-[0.1em] shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-2"><span>💾 儲存本頁</span></button>
                <button onclick="nextPage()" class="flex-[1] bg-secondary text-bglight py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-secondary/30 active:scale-95 transition-all">下一頁</button>
            </div>
        </div>
    </div>

    <div id="poster-wrapper">
        <div id="poster-card" class="p-12"> 
            
            <div class="bg-texture-dots"></div>
            <div class="bg-accent-line"></div>
            <div class="bg-orb-top"></div>
            <div class="bg-orb-bottom"></div>

            <header class="mb-8 relative z-10 flex justify-between items-start" id="out-header">
                <div class="flex items-start gap-4">
                    <div class="flex flex-col">
                        <span class="font-sans text-secondary tracking-[0.25em] text-[11px] font-bold uppercase mb-1">讀書摘要 ｜ HIGHLIGHTS</span>
                        <span id="out-tag" class="font-sans text-primary tracking-[0.1em] text-[16px] font-black uppercase leading-none border-b-2 border-primary/20 pb-1.5 inline-block">分類標籤</span>
                    </div>
                </div>
                <div id="out-no-container" class="font-serif text-secondary text-[15px] font-black tracking-widest uppercase mt-1">
                    VOL. <span id="out-no">01</span>
                </div>
            </header>

            <div id="title-area" class="w-full relative z-10 mb-10 transition-all duration-300">
                <h1 id="out-title" class="font-serif text-primary text-[46px] font-black leading-[1.15] mb-4 tracking-tight drop-shadow-sm transition-all duration-300">等待內容...</h1>
                <h2 id="out-subtitle" class="font-serif text-secondary text-[20px] font-bold tracking-widest italic transition-all duration-300">等待副標題...</h2>
            </div>
            
            <main id="main-content" class="flex-grow space-y-8 relative z-10 flex flex-col justify-center w-full pb-16">
                
                <div id="row1" class="flex items-start gap-5 w-full"> 
                    <div class="flex-shrink-0 mt-0.5">
                        <div class="w-10 h-10 rounded-full bg-secondary text-bglight font-serif font-black flex items-center justify-center text-[22px] shadow-md">1</div>
                    </div> 
                    <div class="w-full border-b border-primary/10 pb-6"> 
                        <h3 id="out-p1t" class="font-serif text-[24px] font-black text-primary mb-1.5"></h3> 
                        <p id="out-p1c" class="font-sans text-primary/70 text-[17px] leading-relaxed font-medium"></p> 
                    </div> 
                </div>

                <div id="row2" class="flex items-start gap-5 w-full"> 
                    <div class="flex-shrink-0 mt-0.5">
                        <div class="w-10 h-10 rounded-full bg-secondary text-bglight font-serif font-black flex items-center justify-center text-[22px] shadow-md">2</div>
                    </div> 
                    <div class="w-full border-b border-primary/10 pb-6"> 
                        <h3 id="out-p2t" class="font-serif text-[24px] font-black text-primary mb-1.5"></h3> 
                        <p id="out-p2c" class="font-sans text-primary/70 text-[17px] leading-relaxed font-medium"></p> 
                    </div> 
                </div>

                <div id="row3" class="flex items-start gap-5 w-full"> 
                    <div class="flex-shrink-0 mt-0.5">
                        <div class="w-10 h-10 rounded-full bg-secondary text-bglight font-serif font-black flex items-center justify-center text-[22px] shadow-md">3</div>
                    </div> 
                    <div class="w-full pb-2"> 
                        <h3 id="out-p3t" class="font-serif text-[24px] font-black text-primary mb-1.5"></h3> 
                        <p id="out-p3c" class="font-sans text-primary/70 text-[17px] leading-relaxed font-medium"></p> 
                    </div> 
                </div>
                
                <div id="quote-box" class="w-full mt-10 bg-gradient-to-b from-primary/[0.2] to-transparent rounded-2xl p-10 flex flex-col items-center justify-center text-center transition-all duration-300">
                    <p id="out-quote" class="w-full text-balance font-serif text-primary text-[24px] font-bold leading-relaxed tracking-widest px-4 transition-all duration-300"></p>
                </div>

            </main>
            
            <footer class="absolute bottom-12 left-12 right-12 flex justify-between items-end z-30">
                <div class="flex items-center gap-3">
                    <span id="page-indicator" class="text-bglight text-[12px] font-black px-4 py-1.5 bg-primary/80 rounded-full tracking-widest font-serif shadow-sm transition-opacity duration-300 inline-block">1 / 1</span>
                </div>
                <div class="flex items-center gap-2 opacity-90">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-secondary">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                    <div class="font-sans text-secondary text-[15px] font-black tracking-widest" id="out-ig">JoeYou501</div>
                </div>
            </footer>
        </div>
    </div> <script>
        let aiSlidesData = [];
        let currentAiIndex = 0;

        window.onload = function() {
            document.getElementById('in-no-num').value = localStorage.getItem('read_last_no') || 1;
            document.getElementById('in-ig').value = localStorage.getItem('read_last_ig') || "@JoeYou501";
            document.getElementById('api-key-input').value = localStorage.getItem('read_api_key') || "";
        };

        async function checkAuth() {
            const pwdInput = document.getElementById('auth-input');
            const keyInput = document.getElementById('api-key-input');
            
            if (!pwdInput || !keyInput) return;
            
            if (pwdInput.value.trim() === ACCESS_PASSWORD) {
                const keyVal = keyInput.value.trim();
                if (!keyVal.startsWith("AIza")) return alert("請輸入有效的 Gemini API Key！");
                
                localStorage.setItem('read_api_key', keyVal);
                
                const overlay = document.getElementById('auth-overlay');
                if (overlay) overlay.remove(); 
                
                await fetchValidModels(keyVal);
                sync();
            } else {
                alert("解鎖密碼錯誤");
                pwdInput.value = "";
            }
        }

        async function fetchValidModels(apiKey) {
            const selectEl = document.getElementById('curated-model-select');
            selectEl.innerHTML = '<option value="">正在為您尋找可用模型...</option>';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();
                
                if (!response.ok) throw new Error("無法連線 Google 伺服器");

                selectEl.innerHTML = '';
                let hasModel = false;
                
                data.models.forEach(model => {
                    if (model.supportedGenerationMethods && model.supportedGenerationMethods.includes("generateContent")) {
                        const pureName = model.name.replace('models/', '');
                        const option = document.createElement('option');
                        option.value = pureName;
                        option.innerText = `${model.displayName} (${pureName})`;
                        
                        if (pureName.includes('lite')) {
                            option.selected = true;
                        } else if (pureName.includes('flash') && !selectEl.options[selectEl.selectedIndex]?.value?.includes('lite')) {
                            option.selected = true;
                        }
                        
                        selectEl.appendChild(option);
                        hasModel = true;
                    }
                });

                if (!hasModel) {
                    selectEl.innerHTML = '<option value="">這把 API Key 沒有任何可用模型</option>';
                } else {
                    const savedModel = localStorage.getItem('read_curated_model');
                    if (savedModel && selectEl.querySelector(`option[value="${savedModel}"]`)) {
                        selectEl.value = savedModel;
                    }
                }
            } catch (err) {
                selectEl.innerHTML = '<option value="">獲取模型失敗，請檢查網路連線</option>';
                console.error(err);
            }
        }

        function saveModelPref() {
            localStorage.setItem('read_curated_model', document.getElementById('curated-model-select').value);
        }

        function toggleEditor() {
            document.getElementById('editor-body').classList.toggle('hidden');
        }

        async function callRealAI() {
            const raw = document.getElementById('ai-raw-input').value;
            const targetPages = parseInt(document.getElementById('ai-target-pages').value) || 5; 
            
            if (!raw) return alert("請貼上文字內容");
            if (targetPages < 3) return alert("圖卡頁數至少需要 3 頁（封面 + 內容 + 結論）才能使用此模式喔！");
            
            const savedApiKey = localStorage.getItem('read_api_key');
            const selectedModel = document.getElementById('curated-model-select').value;
            if (!savedApiKey) return alert("找不到 API Key，請重新整理頁面。");
            if (!selectedModel) return alert("雷達尚未掃描完畢，請稍候！");
            
            const btn = document.getElementById('ai-btn');
            const btnText = document.getElementById('ai-btn-text');
            btn.disabled = true; 
            btnText.innerText = `🚀 正在呼叫 ${selectedModel}...`;

            const prompt = `請以「具備深度洞察力的書評家與編輯」的角度，將以下長篇內容拆解成一組正好 ${targetPages} 頁的「圖卡貼文」。
            請以 JSON 格式回應，不要包含 Markdown 標記。
            【最高指導原則】：
            1. 總共必須產出正好 ${targetPages} 頁 (slides)。
            2. 第 1 頁必須是「封面」(type: "cover")：包含1個主標題、1句副標題。不能有重點 (points) 與金句 (quote)。
            3. 第 2 到 ${targetPages - 1} 頁必須是「內容」(type: "content")：包含單頁標題、副標題、1句段落金句。
               👉 【強制規定】：每一頁內容頁「絕對要」產出「剛好 3 個」核心重點（格式為「小標題|內文描述」）。如果該段落內容較少，請務必將觀念細分拆解，無論如何都不准少於 3 個重點！
            4. 第 ${targetPages} 頁必須是「結論」(type: "conclusion")：包含總結標題、1句強而有力的總結金句。不能有重點 (points)。
            結構必須精準相符，points 陣列內必須剛好有 3 個字串：
            {"slides": [
                {"type": "cover", "title": "封面主標題", "subtitle": "封面副標題", "points": [], "quote": ""},
                {"type": "content", "title": "單頁標題", "subtitle": "副標題", "points": ["重點一小標題|內文描述", "重點二小標題|內文描述", "重點三小標題|內文描述"], "quote": "段落金句"},
                {"type": "conclusion", "title": "總結標題", "subtitle": "", "points": [], "quote": "總結金句"}
            ]}
            輸入長文：\n${raw}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${savedApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || '未知錯誤');
                
                const rawText = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]); 
                
                aiSlidesData = result.slides;
                currentAiIndex = 0;
                document.getElementById('in-total-page').value = aiSlidesData.length;
                document.getElementById('ai-mode-badge').classList.remove('hidden');

                loadSlideToUI(currentAiIndex);
                alert(`✨ 成功！為您精準萃取了 ${aiSlidesData.length} 頁圖卡（含封面與結論）。`);

            } catch (err) {
                alert(`❌ 解析失敗：\n\n${err.message}`);
            } finally {
                btn.disabled = false; 
                btnText.innerText = "🪄 啟動 3 段式圖卡萃取 (封面 ➔ 內容 ➔ 結論)";
            }
        }

        function loadSlideToUI(index) {
            const slide = aiSlidesData[index];
            if (!slide) return;
            
            document.getElementById('in-curr-page').value = index + 1;
            
            if (slide.type) {
                document.getElementById('in-type').value = slide.type;
            } else {
                if (index === 0) document.getElementById('in-type').value = 'cover';
                else if (index === aiSlidesData.length - 1) document.getElementById('in-type').value = 'conclusion';
                else document.getElementById('in-type').value = 'content';
            }

            document.getElementById('in-title').value = slide.title || "";
            document.getElementById('in-subtitle').value = slide.subtitle || "";
            document.getElementById('in-p1').value = slide.points?.[0] || "";
            document.getElementById('in-p2').value = slide.points?.[1] || "";
            document.getElementById('in-p3').value = slide.points?.[2] || "";
            document.getElementById('in-quote').value = slide.quote || "";
            sync();
        }

        function sync() {
            document.getElementById('page-indicator').innerText = `${document.getElementById('in-curr-page').value} / ${document.getElementById('in-total-page').value}`;
            document.getElementById('out-tag').innerText = document.getElementById('in-tag').value || "NOTES";
            
            const outTitle = document.getElementById('out-title');
            const outSubtitle = document.getElementById('out-subtitle');
            
            outTitle.innerHTML = document.getElementById('in-title').value || "等待主標題...";
            
            const subtitleText = document.getElementById('in-subtitle').value;
            if(subtitleText) {
                outSubtitle.innerText = subtitleText;
                outSubtitle.style.display = "block";
            } else {
                outSubtitle.style.display = "none";
            }
            
            const igAccount = document.getElementById('in-ig').value;
            document.getElementById('out-ig').innerText = igAccount;
            localStorage.setItem('read_last_ig', igAccount); 

            const showVol = document.getElementById('show-vol-toggle').checked;
            const volContainer = document.getElementById('out-no-container');
            if (showVol) {
                volContainer.style.display = "block";
                document.getElementById('out-no').innerText = document.getElementById('in-no-num').value.toString().padStart(2, '0');
            } else {
                volContainer.style.display = "none";
            }

            const showPage = document.getElementById('show-page-toggle').checked;
            const pageIndicator = document.getElementById('page-indicator');
            if (showPage) {
                pageIndicator.style.display = "inline-block";
            } else {
                pageIndicator.style.display = "none";
            }

            for (let i = 1; i <= 3; i++) {
                const val = document.getElementById('in-p' + i).value;
                const row = document.getElementById(`row${i}`);
                if (val) {
                    let title = '', content = '';
                    if (val.includes('|')) {
                        [title, content] = val.split('|');
                    } else if (val.includes('：')) { 
                        const parts = val.split('：');
                        title = parts[0];
                        content = parts.slice(1).join('：');
                    } else if (val.includes(':')) { 
                        const parts = val.split(':');
                        title = parts[0];
                        content = parts.slice(1).join(':');
                    } else { 
                        title = `重點 ${i}`;
                        content = val;
                    }
                    document.getElementById(`out-p${i}t`).innerText = title.trim();
                    document.getElementById(`out-p${i}c`).innerText = content.trim();
                }
            }

            const slideType = document.getElementById('in-type').value;
            const titleArea = document.getElementById('title-area');
            const mainContent = document.getElementById('main-content'); 
            const outHeader = document.getElementById('out-header');
            const quoteBox = document.getElementById('quote-box');
            const outQuote = document.getElementById('out-quote');
            const quoteText = document.getElementById('in-quote').value;
            
            const baseTitleClass = "font-serif text-primary font-black leading-[1.15] tracking-tight drop-shadow-sm transition-all duration-300";
            const baseSubtitleClass = "font-serif text-secondary font-bold tracking-widest italic transition-all duration-300";

            // 每次同步前先還原排版
            titleArea.style.display = "block";
            mainContent.style.display = "flex"; 
            outHeader.style.display = "flex"; 
            
            // 洗除絕對定位置中的 class，恢復原本的流式排版
            titleArea.classList.remove('absolute', 'top-1/2', 'left-1/2', 'transform', '-translate-x-1/2', '-translate-y-1/2', 'px-12', 'z-20', 'flex', 'flex-col', 'items-center', 'justify-center');
            titleArea.classList.add('mb-10', 'relative', 'z-10');
            outTitle.classList.remove('text-center', 'w-full');
            outSubtitle.classList.remove('text-center', 'mt-4', 'w-full');

            if (slideType === 'cover') {
                // 🛑 模式 1：封面
                document.getElementById('row1').style.display = "none";
                document.getElementById('row2').style.display = "none";
                document.getElementById('row3').style.display = "none";
                quoteBox.style.display = "none";
                outHeader.style.display = "none"; 
                mainContent.style.display = "none"; 
                
                // 💡 關鍵置中：給標題加上 absolute 定位，並在畫布上精準居中
                titleArea.classList.remove('relative', 'mb-10');
                titleArea.classList.add('absolute', 'top-1/2', 'left-1/2', 'transform', '-translate-x-1/2', '-translate-y-1/2', 'w-full', 'px-12', 'z-20', 'flex', 'flex-col', 'items-center', 'justify-center');
                
                outTitle.className = baseTitleClass + " text-[56px] text-center w-full";
                outSubtitle.className = baseSubtitleClass + " text-[24px] text-center mt-4 w-full";

            } else if (slideType === 'conclusion') {
                // 🛑 模式 2：結論
                document.getElementById('row1').style.display = "none";
                document.getElementById('row2').style.display = "none";
                document.getElementById('row3').style.display = "none";
                
                titleArea.style.display = "none";
                titleArea.classList.remove('mb-10'); 
                
                if (quoteText) {
                    outQuote.innerText = quoteText;
                    quoteBox.style.display = "flex";
                    outQuote.className = "w-full text-balance font-serif text-primary text-[32px] font-bold leading-normal tracking-widest px-4 transition-all duration-300";
                } else {
                    quoteBox.style.display = "none";
                }

            } else {
                // 🛑 模式 3：內容
                for (let i = 1; i <= 3; i++) {
                    const val = document.getElementById('in-p' + i).value;
                    document.getElementById(`row${i}`).style.display = val ? "flex" : "none";
                }
                
                outTitle.className = baseTitleClass + " text-[42px]";
                outSubtitle.className = baseSubtitleClass + " text-[20px]";

                if (quoteText) {
                    outQuote.innerText = quoteText;
                    quoteBox.style.display = "flex";
                    outQuote.className = "w-full text-balance font-serif text-primary text-[24px] font-bold leading-relaxed tracking-widest px-4 transition-all duration-300";
                } else {
                    quoteBox.style.display = "none";
                }
            }
        }

        async function prevPage() {
            if (aiSlidesData.length > 0) {
                if (currentAiIndex > 0) {
                    currentAiIndex--;
                    loadSlideToUI(currentAiIndex);
                } else {
                    alert("這已經是第一頁囉！");
                }
            } else {
                let curr = parseInt(document.getElementById('in-curr-page').value);
                if (curr > 1) { 
                    document.getElementById('in-curr-page').value = curr - 1; 
                    sync(); 
                } else {
                    alert("這已經是第一頁囉！");
                }
            }
        }

        async function nextPage() {
            if (aiSlidesData.length > 0) {
                if (currentAiIndex < aiSlidesData.length - 1) {
                    currentAiIndex++;
                    loadSlideToUI(currentAiIndex);
                } else {
                    alert("🎉 這組圖卡已經到最後一頁囉！");
                }
            } else {
                let curr = parseInt(document.getElementById('in-curr-page').value);
                let total = parseInt(document.getElementById('in-total-page').value);
                if (curr < total) { 
                    document.getElementById('in-curr-page').value = curr + 1; 
                    sync(); 
                } else {
                    alert("🎉 這組圖卡已經到最後一頁囉！");
                }
            }
        }

        async function downloadImage() {
            const node = document.getElementById('poster-card');
            const vol = document.getElementById('in-no-num').value;
            const page = document.getElementById('in-curr-page').value;
            const type = document.getElementById('in-type').value;
            
            localStorage.setItem('read_last_no', vol); 

            try {
                await document.fonts.ready;
                const dataUrl = await htmlToImage.toPng(node, { 
                    pixelRatio: 3, 
                    backgroundColor: '#fdfbf7',
                    width: 720 
                });
                const link = document.createElement('a');
                link.download = `Editorial-Note-Vol${vol}-P${page}-${type}.png`;
                link.href = dataUrl; 
                link.click();
                
                await new Promise(r => setTimeout(r, 500)); 
            } catch (err) { 
                alert('圖片產生出錯，請確認瀏覽器支援 html-to-image 套件。'); 
            }
        }
    </script>
</body>
